syntax = "proto3";

option java_multiple_files = true;
option java_package = "org.project.grpc";
option java_outer_classname = "DataServiceProto";

import "google/protobuf/empty.proto";


message DataEntity {
    string key = 1;
    bytes value = 2;
}


service DataService {
  rpc putData (PutDataRequest) returns (PutDataResponse);
  rpc getData (GetDataRequest) returns (GetDataResponse);
  rpc deleteData (DeleteDataRequest) returns (DeleteDataResponse);
  rpc range (RangeRequest) returns (stream DataEntity);
  rpc count (google.protobuf.Empty) returns (CountResponse);
}


message PutDataRequest {
    string key = 1;
    bytes value = 2;
}

message PutDataResponse {
    DataEntity entity = 1;
}


message GetDataRequest {
    string key = 1;
}

message GetDataResponse {
    bytes value = 1;
}


message DeleteDataRequest {
    string key = 1;
}

message DeleteDataResponse {
    bool success = 1;
}


message RangeRequest {
    string key_since = 1;
    string key_to = 2;
}


message CountResponse {
    int64 count = 1;
}


enum ErrorCode {
    INVALID_ENTITY_KEY = 0;
    ENTITY_KEY_CANNOT_BE_NULL = 1;
}