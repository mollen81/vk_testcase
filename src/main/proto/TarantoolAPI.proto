syntax = "proto3";

option java_multiple_files = true;
option java_package = "org.project";
option java_outer_classname = "TarantoolAPI";

package org.project;

service DataService {
  rpc putData (PutDataRequest) returns (DataResponse);
  rpc getData (GetDataRequest) returns (DataResponse);
}

message PutDataRequest {
  string key = 1;
  bytes value = 2;
}

message GetDataRequest {

}

message DataResponse {
  string key = 1;
  bytes value = 2;
}
